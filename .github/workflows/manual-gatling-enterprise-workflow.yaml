name: Manual Trigger Gatling Enterprise CI/CD

on:
  workflow_dispatch:

env:
  GATLING_ENTERPRISE_API_TOKEN: ${{ secrets.API_TOKEN }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'maven'

      - name: Deploy Java/Maven project
        working-directory: java/maven
        run: mvn gatling:enterpriseDeploy

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Deploy JavaScript project
        working-directory: javascript
        run: |
          npm install && \
          npx gatling enterprise-deploy
